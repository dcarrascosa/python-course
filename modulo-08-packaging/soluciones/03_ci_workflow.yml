# Solución del ejercicio 03: Workflow de GitHub Actions para CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Instalar Python 3.12
        run: uv python install 3.12

      - name: Sincronizar dependencias
        run: uv sync --frozen

      - name: Lint con ruff
        run: uv run ruff check src tests

      - name: Type-check con mypy
        run: uv run mypy src

      - name: Tests con cobertura
        run: uv run pytest --cov=src --cov-fail-under=80
